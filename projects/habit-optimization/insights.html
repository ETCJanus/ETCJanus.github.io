<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Insights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="supabase-config.js"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        .view-btn { padding: 8px 16px; background: #21262d; border: 1px solid #30363d; border-radius: 999px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; color: #8b949e; cursor: pointer; transition: all 0.2s; }
        .view-btn.active { color: #58a6ff; border-color: #58a6ff; box-shadow: 0 0 8px rgba(88,166,255,0.2); }
        .view-btn:hover:not(.active) { color: #c9d1d9; border-color: #8b949e; }
        
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; justify-content: center; transition: border-color 0.2s; }
        .stat-card:hover { border-color: #58a6ff; }
    </style>
    <script src="theme.js"></script>
</head>
<body class="flex flex-col items-center min-h-screen pt-8 pb-16">
    <nav class="w-full flex justify-center items-center gap-10 mb-6 text-gray-500 mt-4 opacity-80 hover:opacity-100 transition-opacity">
        <a href="index.html" title="Tracker" class="hover:text-white hover:scale-110 transition-all"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg></a>
        <a href="checklist.html" title="Checklist" class="hover:text-white hover:scale-110 transition-all"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg></a>
        <a href="settings.html" title="Settings" class="hover:text-white hover:scale-110 transition-all"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></a>
    </nav>
    <div class="w-full max-w-2xl px-4 flex flex-col gap-6">
        <div class="text-center mt-2 mb-2">
            <h1 class="text-2xl tracking-widest text-white uppercase font-light mb-2">My Insights</h1>
            <p class="text-gray-500 text-sm tracking-wide">Last 30 Days</p>
        </div>
          <!-- Weekly Mini-Summary -->
          <div id="weekly-summary" class="w-full max-w-md mx-auto mb-2 py-3 px-6 bg-[#161b22] border border-[#30363d] rounded-full flex flex-col items-center justify-center opacity-0 transition-opacity duration-500">
              <p class="text-sm text-[#8b949e] font-semibold tracking-wide text-center m-0">
                  <span id="weekly-summary-text">Calculating weekly progress...</span>
                  <span id="weekly-summary-emoji" class="ml-1">⏳</span>
              </p>
              <div class="w-full h-1.5 bg-[#0d1117] rounded-full mt-2 overflow-hidden border border-[#30363d]">
                  <div id="weekly-summary-bar" class="h-full bg-[#238636] w-0 transition-all duration-1000 ease-out"></div>
              </div>
          </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="stats-grid">
            <div class="stat-card">
                <span class="text-[9px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Top Performer</span>
                <span class="text-white text-base font-light tracking-wide truncate" id="stat-best-name">--</span>
                <span class="text-[#39d353] text-xs mt-1 font-semibold" id="stat-best-val">--</span>
            </div>
            <div class="stat-card">
                <span class="text-[9px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Needs Focus</span>
                <span class="text-white text-base font-light tracking-wide truncate" id="stat-worst-name">--</span>
                <span class="text-[#f78166] text-xs mt-1 font-semibold" id="stat-worst-val">--</span>
            </div>
            <div class="stat-card">
                <span class="text-[9px] text-gray-500 uppercase tracking-widest font-semibold mb-1" id="stat-shiny-title">Shiny Streak ✨</span>
                <span class="text-white text-base font-light tracking-wide truncate" id="stat-shiny-name">--</span>
                <span class="text-[#bc6bff] text-xs mt-1 font-semibold" id="stat-shiny-val">--</span>
            </div>
            <div class="stat-card">
                <span class="text-[9px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Overall</span>
                <span class="text-white text-base font-light tracking-wide truncate">Consistency</span>
                <span class="text-[#58a6ff] text-xs mt-1 font-semibold" id="stat-overall-val">--</span>
            </div>
        </div>

        <div class="flex justify-center gap-3 mt-6">
            <button id="btn-duration" class="view-btn active">Hours Slept</button>
            <button id="btn-times" class="view-btn">Bed / Wake Times</button>
            <button id="btn-mood" class="view-btn">Mood</button>
        </div>
        <div class="w-full bg-[#161b22] border border-[#30363d] p-4 rounded-xl relative h-64 md:h-80">
            <canvas id="sleepChart"></canvas>
        </div>

        <div class="mt-4 bg-[#161b22] border border-[#30363d] p-5 rounded-xl">
            <h2 class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-3 border-b border-[#30363d] pb-2">Discoveries Engine</h2>
            <div id="correlation-results" class="flex flex-col gap-3 text-sm text-gray-300 font-light">
                <p class="animate-pulse">Analyzing patterns...</p>
            </div>
        </div>
    </div>

    <script>
        const passcode = localStorage.getItem('habit_passcode');
        if (!passcode) window.location.href = 'index.html';

        const supabaseUrl = window.HABIT_SUPABASE_URL;
        const supabaseKey = window.HABIT_SUPABASE_ANON_KEY;
        const tableLogs = 'habit_logs';
        
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);
        const ctx = document.getElementById('sleepChart').getContext('2d');
        const btnDur = document.getElementById('btn-duration');
        const btnTimes = document.getElementById('btn-times');
        const btnMood = document.getElementById('btn-mood');

        let sleepChart;
        let viewMode = 'duration'; // 'duration', 'times', or 'mood'
        
        let dates = [];
        let durationData = [];
        let timesData = [];
        let moodData = [];

        // Utilities
        const formatTimeFromDec = (decHour) => {
            let h = Math.floor(decHour);
            let m = Math.round((decHour - h) * 60);
            if (h >= 24) h -= 24;
            const ampm = h >= 12 ? 'PM' : 'AM';
            let h12 = h % 12;
            if (h12 === 0) h12 = 12;
            return h12 + ':' + m.toString().padStart(2, '0') + ' ' + ampm;
        };

        const formatDate = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + d;
        };

        const renderWeeklySummary = (habitsWait, allLogs) => {
            const summaryWrapper = document.getElementById('weekly-summary');
            const textEl = document.getElementById('weekly-summary-text');
            const barEl = document.getElementById('weekly-summary-bar');
            const emojiEl = document.getElementById('weekly-summary-emoji');
            
            if (!summaryWrapper || !textEl || !barEl) return;
            
            if (habitsWait.length === 0) {
                summaryWrapper.classList.add('opacity-0');
                textEl.textContent = "No habits tracked.";
                return;
            }
            
            const today = new Date();
            const startOfWeek = new Date(today);
            const day = today.getDay() || 7; // Convert Sun (0) to 7
            startOfWeek.setDate(today.getDate() - day + 1); // Monday of current week
            
            const weekDates = [];
            for(let i = 0; i < 7; i++) {
                const d = new Date(startOfWeek);
                d.setDate(d.getDate() + i);
                if (d <= today) {
                    weekDates.push(formatDate(d));
                }
            }

            let possible = 0;
            let completed = 0;
            
            weekDates.forEach(dateStr => {
                const dayLogs = allLogs.filter(l => l.log_date === dateStr && l.event_type === 'progress');
                habitsWait.forEach(habit => {
                    possible += 1;
                    const log = dayLogs.find(l => l.habit_id === habit.id);
                    if (log && log.current_amount > 0) {
                        completed += 1;
                    } else if (habit.target_amount < 0 && (!log || log.current_amount === 0)) {
                        completed += 1;
                    }
                });
            });

            let pct = 0;
            let text = "Let's start fresh this week!";
            if (possible > 0) {
                pct = Math.round((completed / possible) * 100);
                text = `You've completed ${pct}% of your habits this week!`;
            }

            summaryWrapper.classList.remove('opacity-0');
            textEl.textContent = text;
            
            let emoji = "💪";
            if (pct >= 100) emoji = "🚀";
            else if (pct < 50) emoji = "🌱";
            else if (pct < 20) emoji = "😴";
            emojiEl.textContent = emoji;

            requestAnimationFrame(() => {
                barEl.style.width = `${pct}%`;
                barEl.className = `h-full transition-all duration-1000 ease-out ${pct >= 80 ? 'bg-[#39d353]' : pct >= 50 ? 'bg-[#2ea043]' : 'bg-[#e3b341]'}`;
            });
        };

        const loadData = async () => {
            const today = new Date();
            const startRange = new Date();
            startRange.setDate(today.getDate() - 30);
            const startStr = startRange.toISOString().split('T')[0];

            const [sleepRes, habitRes, logRes, moodRes] = await Promise.all([
                client.from(tableLogs).select('*').eq('passcode_key', passcode).eq('event_type', 'sleep').gte('log_date', startStr).order('log_date', { ascending: true }),
                client.from('habits').select('*').eq('passcode_key', passcode).eq('archived', false),
                client.from(tableLogs).select('*').eq('passcode_key', passcode).eq('event_type', 'progress').gte('log_date', startStr),
                client.from(tableLogs).select('*').eq('passcode_key', passcode).eq('event_type', 'mood').gte('log_date', startStr).order('log_date', { ascending: true })
            ]);

            if (sleepRes.data || moodRes.data) processData(sleepRes.data || [], moodRes.data || []);
              if (habitRes.data && logRes.data) {
                  processHabitStats(habitRes.data, logRes.data);
                  renderWeeklySummary(habitRes.data, logRes.data);
              }
            runCorrelationEngine(habitRes.data || [], logRes.data || [], sleepRes.data || [], moodRes.data || []);
            
            renderChart();
        };

        const runCorrelationEngine = (habits, progressLogs, sleepLogs, moodLogs) => {
            const resultsDiv = document.getElementById('correlation-results');
            if (habits.length === 0 || progressLogs.length === 0) {
                resultsDiv.innerHTML = '<p class="opacity-50">Not enough data to calculate discoveries yet.</p>';
                return;
            }

            let discoveries = [];

            // Helper to get daily completion percentage
            const daysMap = {};
            progressLogs.forEach(l => {
                if (!daysMap[l.log_date]) daysMap[l.log_date] = { wins: 0, total: habits.length, isShinyClean: true };
                const h = habits.find(h => h.id === l.habit_id);
                if (!h) return;
                
                const amt = Number(l.current_amount);
                if (h.target_amount == 1 && amt >= 1) daysMap[l.log_date].wins++;
                if (h.target_amount == -2 && amt >= 1) daysMap[l.log_date].isShinyClean = true;
                if (h.target_amount == -2 && amt == 0) daysMap[l.log_date].isShinyClean = false; // broke shiny
            });

            // Discovery 1: Sleep vs Habit Success
            if (sleepLogs.length > 2) {
                let goodSleepWinsSum = 0, goodSleepDays = 0;
                let badSleepWinsSum = 0, badSleepDays = 0;

                sleepLogs.forEach(sl => {
                    const d = daysMap[sl.log_date];
                    if (!d || !sl.metadata || !sl.metadata.start || !sl.metadata.end) return;

                    const [sh, sm] = sl.metadata.start.split(':').map(Number);
                    const [eh, em] = sl.metadata.end.split(':').map(Number);
                    let sDec = sh + (sm / 60);
                    let eDec = eh + (em / 60);
                    let dur = eDec - sDec;
                    if (dur < 0) dur += 24;

                    const successRate = d.wins / d.total;
                    if (dur >= 7) { goodSleepWinsSum += successRate; goodSleepDays++; }
                    else { badSleepWinsSum += successRate; badSleepDays++; }
                });

                if (goodSleepDays > 0 && badSleepDays > 0) {
                    const goodAvg = goodSleepWinsSum / goodSleepDays;
                    const badAvg = badSleepWinsSum / badSleepDays;
                    if (goodAvg > badAvg + 0.1) {
                        discoveries.push(`🌟 You are <strong class="text-[#39d353]">${Math.round((goodAvg - badAvg) * 100)}% more likely</strong> to complete your habits on days you sleep over 7 hours.`);
                    }
                }
            }

            // Discovery 2: Shiny Streak vs Mood
            if (moodLogs.length > 2) {
                let shinyMoodSum = 0, shinyDays = 0;
                let brokenMoodSum = 0, brokenDays = 0;

                moodLogs.forEach(ml => {
                    const d = daysMap[ml.log_date];
                    if (!d || !ml.metadata || !ml.metadata.level) return;

                    const mood = ml.metadata.level;
                    if (d.isShinyClean) { shinyMoodSum += mood; shinyDays++; }
                    else { brokenMoodSum += mood; brokenDays++; }
                });

                if (shinyDays > 0 && brokenDays > 0) {
                    const shinyAvg = shinyMoodSum / shinyDays;
                    const brokenAvg = brokenMoodSum / brokenDays;
                    if (shinyAvg > brokenAvg + 0.5) {
                        discoveries.push(`🔥 Your average mood is <strong class="text-[#bc6bff]">${(shinyAvg - brokenAvg).toFixed(1)} points higher</strong> when your Shiny streak is uncompromised.`);
                    } else if (brokenAvg > shinyAvg + 0.5) {
                        discoveries.push(`⚖️ Interestingly, your mood averages <strong class="text-yellow-400">${(brokenAvg - shinyAvg).toFixed(1)} points higher</strong> on days you break your Shiny streak.`);
                    }
                }
            }

            if (discoveries.length > 0) {
                resultsDiv.innerHTML = discoveries.map(d => `<p>${d}</p>`).join('');
            } else {
                resultsDiv.innerHTML = '<p class="opacity-50">Log more sleep and mood data to unlock behavioral discoveries.</p>';
            }
        };

        const processHabitStats = (habits, logs) => {
            let hStats = {};
            habits.forEach(h => { hStats[h.id] = { id: h.id, name: h.name, target: h.target_amount, wins: 0, total: 0 }; });

            logs.forEach(l => {
                const hid = l.habit_id;
                if (!hStats[hid]) return;
                hStats[hid].total++;
                
                const amount = Number(l.current_amount);
                if (hStats[hid].target == 1 && amount >= 1) hStats[hid].wins++;
                if (hStats[hid].target == -2 && amount >= 1) hStats[hid].wins++;
            });

            let best = null, worst = null, shiny = null;
            let overallWins = 0, overallTotal = 0;

            let valid = Object.values(hStats).filter(s => s.total > 0);
            valid.forEach(s => {
                s.rate = s.wins / s.total;
                overallWins += s.wins;
                overallTotal += s.total;
                
                if (s.target == 1) {
                    if (!best || s.rate > best.rate) best = s;
                    if (!worst || s.rate < worst.rate) worst = s;
                }
                
                if (s.target == -2 && !shiny) shiny = s; 
            });

            const isStealth = localStorage.getItem('habit_stealth_mode') === 'true';
            const getName = (name) => isStealth ? name.replace(/weed/gi, 'phone usage') : name;

            if (best) {
                document.getElementById('stat-best-name').textContent = getName(best.name);
                document.getElementById('stat-best-val').textContent = Math.round(best.rate * 100) + '% Win Rate';
            }
            if (worst) {
                document.getElementById('stat-worst-name').textContent = getName(worst.name);
                document.getElementById('stat-worst-val').textContent = Math.round(worst.rate * 100) + '% Win Rate';
            }
            if (overallTotal > 0) {
                let ov = Math.round((overallWins / overallTotal) * 100);
                document.getElementById('stat-overall-val').textContent = ov + '% Success';
            }

            if (shiny) {
                document.getElementById('stat-shiny-name').textContent = getName(shiny.name);
                let shinyLogs = logs.filter(l => l.habit_id === shiny.id);
                shinyLogs.sort((a,b) => new Date(b.log_date) - new Date(a.log_date));
                
                let streak = 0;
                for(let log of shinyLogs) {
                    if (Number(log.current_amount) >= 1) streak++;
                    else break;
                }
                document.getElementById('stat-shiny-val').textContent = streak + ' Days Streak';
            } else {
                document.getElementById('stat-shiny-title').textContent = 'No Shiny Habit';
            }
        };

        const processData = (sleepLogs, moodLogs) => {
            dates = [];
            durationData = [];
            timesData = [];
            moodData = [];

            const dateSet = new Set();
            sleepLogs.forEach(l => dateSet.add(l.log_date));
            moodLogs.forEach(l => dateSet.add(l.log_date));
            
            const sortedDates = Array.from(dateSet).sort();

            sortedDates.forEach(dateKey => {
                const sLog = sleepLogs.find(l => l.log_date === dateKey);
                const mLog = moodLogs.find(l => l.log_date === dateKey);

                const dateObj = new Date(dateKey + 'T12:00:00');
                dates.push(dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }));

                if (sLog && sLog.metadata && sLog.metadata.start && sLog.metadata.end) {
                    const { start, end } = sLog.metadata;
                    const shStr = start.split(':')[0];
                    const smStr = start.split(':')[1];
                    const ehStr = end.split(':')[0];
                    const emStr = end.split(':')[1];
                    const sh = Number(shStr);
                    const sm = Number(smStr);
                    const eh = Number(ehStr);
                    const em = Number(emStr);

                    let sDec = sh + (sm / 60);
                    let eDec = eh + (em / 60);

                    let dur = eDec - sDec;
                    if (dur < 0) dur += 24;
                    
                    if (sDec < 12) sDec += 24; 
                    let shiftEnd = sDec + dur;

                    durationData.push(dur);
                    timesData.push([sDec, shiftEnd]);
                } else {
                    durationData.push(null);
                    timesData.push([null, null]);
                }

                if (mLog && mLog.metadata && mLog.metadata.level) {
                    moodData.push(mLog.metadata.level);
                } else {
                    moodData.push(null);
                }
            });
        };

        const initChart = () => {
            if (sleepChart) sleepChart.destroy();
            const isDur = viewMode === 'duration';
            const isMood = viewMode === 'mood';

            let datasets = [];
            if (isDur) {
                datasets = [{
                    label: 'Hours Slept',
                    data: durationData,
                    backgroundColor: 'rgba(88, 166, 255, 0.2)',
                    borderColor: '#58a6ff',
                    pointBackgroundColor: '#58a6ff',
                    borderWidth: 2,
                    pointRadius: 3,
                    tension: 0.3,
                    fill: true
                }];
            } else if (isMood) {
                datasets = [{
                    label: 'Mood',
                    data: moodData,
                    backgroundColor: 'rgba(234, 179, 8, 0.2)',
                    borderColor: '#eab308',
                    pointBackgroundColor: '#eab308',
                    borderWidth: 2,
                    pointRadius: 3,
                    tension: 0.3,
                    fill: true
                }];
            } else {
                datasets = [{
                    label: 'Bed Time',
                    data: timesData.map(d => d[0]),
                    backgroundColor: 'transparent',
                    borderColor: '#bc6bff',
                    pointBackgroundColor: '#bc6bff',
                    borderWidth: 2,
                    pointRadius: 3,
                    tension: 0.3
                }, {
                    label: 'Wake Time',
                    data: timesData.map(d => d[1]),
                    backgroundColor: 'rgba(188, 107, 255, 0.15)',
                    borderColor: '#bc6bff',
                    pointBackgroundColor: '#bc6bff',
                    borderWidth: 2,
                    pointRadius: 3,
                    tension: 0.3,
                    fill: '-1'
                }];
            }

            const cfg = {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: (!isDur && !isMood), labels: { color: '#8b949e', font: { size: 10, family: 'ui-sans-serif' } } },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    if (isDur) {
                                        let h = Math.floor(context.raw);
                                        let m = Math.round((context.raw - h) * 60);
                                        return h + 'h ' + m + 'm';
                                    } else if (isMood) {
                                        return 'Mood: ' + context.raw + ' / 10';
                                    } else {
                                        return context.dataset.label + ': ' + formatTimeFromDec(context.raw);
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#30363d', display: false },
                            ticks: { color: '#8b949e', font: { size: 10, family: 'ui-sans-serif' } }
                        },
                        y: {
                            grid: { color: '#30363d' },
                            beginAtZero: (isDur || isMood),
                            min: isDur ? 0 : (isMood ? 1 : 18),
                            max: isDur ? undefined : (isMood ? 10 : undefined),
                            ticks: {
                                color: '#8b949e',
                                font: { size: 10, family: 'ui-sans-serif' },
                                stepSize: isDur ? 2 : (isMood ? 1 : 2),
                                callback: (val) => {
                                    if (isDur) return val + ' h';
                                    if (isMood) return val;
                                    return formatTimeFromDec(val);
                                }
                            }
                        }
                    }
                }
            };
            sleepChart = new Chart(ctx, cfg);
        };

        const renderChart = () => {
            initChart();
        };

        btnDur.addEventListener('click', () => {
            viewMode = 'duration';
            btnDur.classList.add('active');
            btnTimes.classList.remove('active');
            btnMood.classList.remove('active');
            renderChart();
        });

        btnTimes.addEventListener('click', () => {
            viewMode = 'times';
            btnTimes.classList.add('active');
            btnDur.classList.remove('active');
            btnMood.classList.remove('active');
            renderChart();
        });

        btnMood.addEventListener('click', () => {
            viewMode = 'mood';
            btnMood.classList.add('active');
            btnDur.classList.remove('active');
            btnTimes.classList.remove('active');
            renderChart();
        });

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
