<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 0; min-height: 100vh; }
        input, button, select { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px; padding: 12px; font-size: 16px; width: 100%; outline: none; }
        input:focus, select:focus { border-color: #58a6ff; }
        input[type="month"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .btn-primary { background: #238636; border: 1px solid rgba(240,246,252,0.1); cursor: pointer; color: white; font-weight: bold; }
        .btn-primary:hover { background: #2ea043; }
        .tab-btn { background: transparent; border: none; font-weight: normal; color: #8b949e; cursor: pointer; padding: 10px 16px; transition: 0.2s; border-bottom: 2px solid transparent; border-radius: 0; }
        .tab-btn:hover { color: #c9d1d9; }
        .tab-btn.active { color: #58a6ff; border-bottom: 2px solid #58a6ff; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script src="theme.js"></script>
</head>
<body class="flex flex-col items-center min-h-screen pt-12 pb-20">
    <nav class="w-full flex justify-center items-center gap-10 mt-4 opacity-80 hover:opacity-100 transition-opacity text-gray-500 absolute top-0 py-6 text-xl lg:text-2xl">
        <a href="index.html" title="Tracker" class="hover:text-white hover:scale-110 transition-all"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg></a>
        <a href="checklist.html" title="Checklist" class="hover:text-white hover:scale-110 transition-all"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg></a>
        <a href="insights.html" title="Insights" class="hover:text-white hover:scale-110 transition-all"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></a>
    </nav>
    
    <div class="w-full max-w-lg px-4 mt-8">
        <h1 class="text-2xl tracking-widest text-white uppercase font-light mb-6 text-center">Settings Hub</h1>
        
        <!-- Navigation Tabs -->
        <div class="flex justify-center border-b border-[#30363d] mb-8">
            <button class="tab-btn w-auto active" data-target="tab-habits">Habits</button>
            <button class="tab-btn w-auto" data-target="tab-display">Display</button>
            <button class="tab-btn w-auto" data-target="tab-profile">Profile</button>
        </div>

        <!-- TAB: Habits -->
        <div id="tab-habits" class="tab-content active px-2">
            <div class="mb-10 bg-[#161b22] px-5 py-5 rounded-md border border-[#30363d]">
                <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-4 font-semibold pb-2 border-b border-[#30363d]">Add New Habit</h2>
                
                <div class="flex flex-col gap-4">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Habit Name</label>
                        <input type="text" id="new-habit-input" placeholder="e.g., Read 10 Pages">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Habit Type</label>
                        <select id="new-habit-type" class="w-full p-3 text-sm bg-[#21262d] border border-[#30363d] text-white rounded outline-none focus:border-[#58a6ff]">
                            <option value="1">Good Habit (Do this)</option>

                            <option value="-2">Shiny Target (Avoid this & Celebrate!)</option>
                        </select>
                    </div>
                    <button id="add-habit-btn" class="btn-primary w-full py-3 mt-2 text-sm tracking-wide">Create Habit</button>
                </div>
                <p id="feedback-msg" class="text-xs mt-3 hidden text-center"></p>
            </div>

            <div>
                <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-3 font-semibold pb-2 border-b border-[#30363d]">Active Habits</h2>
                <div id="habits-list" class="flex flex-col gap-3">
                    <p class="text-sm text-gray-500 italic text-center">Loading...</p>
                </div>
                <p class="mt-8 text-[10px] text-gray-600 text-center italic">Archiving a habit hides it from today onwards without deleting historical progress.</p>
            </div>
        </div>

        <!-- TAB: Display -->
        <div id="tab-display" class="tab-content px-2">
            <div class="bg-[#161b22] px-5 py-5 rounded-md border border-[#30363d] mb-4">
                <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-4 font-semibold pb-2 border-b border-[#30363d]">App Theme</h2>
                <div class="flex flex-col gap-4">
                    <select id="theme-selector" class="w-full p-3 text-sm bg-[#21262d] border border-[#30363d] text-white rounded outline-none focus:border-[#58a6ff]">
                        <option value="dark">Dark (Default)</option>
                        <option value="light">Light</option>
                        <option value="blue">Midnight Blue</option>
                    </select>
                </div>
            </div>

            <div class="bg-[#161b22] px-5 py-5 rounded-md border border-[#30363d]">
                <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-4 font-semibold pb-2 border-b border-[#30363d]">Grid Date Range</h2>
                <div class="flex flex-col gap-4">
                    <div class="flex flex-col w-full">
                        <label class="text-[10px] text-gray-500 uppercase tracking-widest mb-1.5 ml-1">Start Month</label>
                        <input type="month" id="start-month-input" class="w-full p-3 text-sm bg-[#21262d] border border-[#30363d] text-white rounded outline-none focus:border-[#58a6ff]">
                    </div>
                    <div class="flex flex-col w-full">
                        <label class="text-[10px] text-gray-500 uppercase tracking-widest mb-1.5 ml-1">End Month</label>
                        <input type="month" id="end-month-input" class="w-full p-3 text-sm bg-[#21262d] border border-[#30363d] text-white rounded outline-none focus:border-[#58a6ff]">
                    </div>
                </div>
                <button id="save-range-btn" class="btn-primary w-full py-3 mt-4 text-sm tracking-wide">Save Range</button>
                <p id="settings-feedback" class="text-xs mt-3 hidden text-green-400 text-center"></p>
            </div>
        </div>

        <!-- TAB: Profile -->
        <div id="tab-profile" class="tab-content px-2">
            <div class="bg-[#161b22] px-5 py-8 rounded-md border border-red-900/50 flex flex-col items-center relative gap-4">
                <!-- Discreet Stealth Mode Toggle -->
                <div class="absolute top-4 right-4 group">
                    <label class="relative flex items-center justify-center cursor-pointer w-4 h-4 rounded border border-[#30363d] hover:border-[#8b949e] transition-colors overflow-hidden bg-[#0d1117]">
                      <input type="checkbox" id="stealth-toggle" class="sr-only peer">
                      <div class="w-full h-full bg-transparent peer-checked:bg-[#21262d] flex items-center justify-center transition-colors">
                          <div class="w-1.5 h-1.5 rounded-sm bg-transparent peer-checked:bg-[#8b949e]"></div>
                      </div>
                    </label>
                </div>

                <div class="flex flex-col items-center w-full">
                    <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-3 font-semibold pb-2 text-center w-full">Security</h2>
                    <p class="text-sm text-gray-400 text-center mb-6 max-w-[280px]">If you update your device, you will be logged out.</p>
                </div>
                
                <button id="reset-passcode-btn" class="w-full max-w-[200px] border border-red-500 text-red-400 py-2.5 rounded-md hover:bg-red-500/10 transition-colors uppercase tracking-widest text-xs font-bold">Log Out</button>

                  <div class="flex flex-col items-center w-full mt-8">
                      <h2 class="text-xs uppercase tracking-widest text-gray-500 mb-3 font-semibold pb-2 text-center w-full">Data Management</h2>
                      <p class="text-sm text-gray-400 text-center mb-6 max-w-[280px]">Download a full backup of your habits and logs.</p>
                      <button id="export-data-btn" class="w-full max-w-[200px] border border-[#58a6ff] text-[#58a6ff] py-2.5 rounded-md hover:bg-[#58a6ff]/10 transition-colors uppercase tracking-widest text-xs font-bold">Export Backup</button>
                  </div>
        </div>
        
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const passcode = localStorage.getItem('habit_passcode');
            if (!passcode) {
                window.location.href = 'index.html';
                return;
            }

            // Tab Switching Logic
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.getAttribute('data-target')).classList.add('active');
                });
            });

            // Display Config Base
            const startInput = document.getElementById('start-month-input');
            const endInput = document.getElementById('end-month-input');
            const saveRangeBtn = document.getElementById('save-range-btn');
            const settingsFeedback = document.getElementById('settings-feedback');
            
            startInput.value = localStorage.getItem('habit_grid_start') || '2026-04';
            endInput.value = localStorage.getItem('habit_grid_end') || '2027-03';
            
            saveRangeBtn.addEventListener('click', () => {
                if (startInput.value && endInput.value && startInput.value <= endInput.value) {
                    localStorage.setItem('habit_grid_start', startInput.value);
                    localStorage.setItem('habit_grid_end', endInput.value);
                    settingsFeedback.textContent = 'Settings saved! Check your grid.';
                    settingsFeedback.className = 'text-xs mt-3 text-green-400 text-center';
                    settingsFeedback.classList.remove('hidden');
                    setTimeout(() => settingsFeedback.classList.add('hidden'), 3000);
                } else {
                    settingsFeedback.textContent = 'Invalid date range.';
                    settingsFeedback.className = 'text-xs mt-3 text-red-400 text-center';
                    settingsFeedback.classList.remove('hidden');
                    setTimeout(() => settingsFeedback.classList.add('hidden'), 3000);
                }
            });

            // Theme Logic
            const themeSelector = document.getElementById('theme-selector');
            if(themeSelector) {
                themeSelector.value = localStorage.getItem('habit_theme') || 'dark';
                themeSelector.addEventListener('change', (e) => {
                    localStorage.setItem('habit_theme', e.target.value);
                    window.location.reload();
                });
            }

            // Stealth Logic
            const stealthToggle = document.getElementById('stealth-toggle');
            if(stealthToggle) {
                stealthToggle.checked = localStorage.getItem('habit_stealth_mode') === 'true';
                stealthToggle.addEventListener('change', (e) => {
                    localStorage.setItem('habit_stealth_mode', e.target.checked);
                    loadHabits(); // reload names visually
                });
            }

            // Profile Logic
            document.getElementById('reset-passcode-btn').addEventListener('click', () => {
                localStorage.removeItem('habit_passcode');
                window.location.href = 'index.html';
            });

              document.getElementById('export-data-btn').addEventListener('click', async () => {
                  const url = window.HABIT_SUPABASE_URL;
                  const key = window.HABIT_SUPABASE_ANON_KEY;
                  if (!url || !key) return;
                  const client = window.supabase.createClient(url, key);
                  
                  try {
                      document.getElementById('export-data-btn').textContent = "Downloading...";
                      const { data: habits, error: hError } = await client.from('habits').select('*').eq('passcode_key', passcode);
                      if (hError) throw hError;
                      
                      const habitIds = habits.map(h => h.id);
                      const { data: logs, error: lError } = await client.from('habit_logs').select('*').in('habit_id', habitIds);
                      if (lError) throw lError;
                      
                      const backup = {
                          exportDate: new Date().toISOString(),
                          habits,
                          logs
                      };
                      
                      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup, null, 2));
                      const downloadAnchorNode = document.createElement('a');
                      downloadAnchorNode.setAttribute("href", dataStr);
                      downloadAnchorNode.setAttribute("download", `habit_tracker_backup_${new Date().toISOString().split('T')[0]}.json`);
                      document.body.appendChild(downloadAnchorNode);
                      downloadAnchorNode.click();
                      downloadAnchorNode.remove();
                  } catch (e) {
                      console.error("Export Error:", e);
                      alert("Failed to export data.");
                  } finally {
                      document.getElementById('export-data-btn').textContent = "Export Backup";
                  }
              });

            const url = window.HABIT_SUPABASE_URL;
            const key = window.HABIT_SUPABASE_ANON_KEY;
            const client = window.supabase.createClient(url, key);
            
            const listEl = document.getElementById('habits-list');
            const inputEl = document.getElementById('new-habit-input');
            const typeEl = document.getElementById('new-habit-type');
            const addBtn = document.getElementById('add-habit-btn');
            const feedbackEl = document.getElementById('feedback-msg');

            const showFeedback = (msg, isError) => {
                feedbackEl.textContent = msg;
                feedbackEl.className = 'text-xs mt-3 text-center ' + (isError ? 'text-red-400' : 'text-green-400');
                feedbackEl.classList.remove('hidden');
                setTimeout(() => feedbackEl.classList.add('hidden'), 3000);
            };

            const loadHabits = async () => {
                const { data, error } = await client
                    .from('habits')
                    .select('*')
                    .eq('passcode_key', passcode)
                    .eq('archived', false)
                        .order('sort_order', { ascending: true })
                        .order('created_at', { ascending: true });

                    if (error) {
                        listEl.innerHTML = '<p class="text-red-400 text-sm">Failed to load habits.</p>';
                        return;
                    }

                    listEl.innerHTML = '';
                    if (data.length === 0) listEl.innerHTML = '<p class="text-gray-500 text-sm text-center">No active habits.</p>';

                    data.forEach((h, index) => {
                        const wrap = document.createElement('div');
                        wrap.className = 'flex justify-between items-center bg-[#161b22] px-4 py-3 rounded-md border border-[#30363d] group';
                        wrap.dataset.id = h.id;
                        wrap.dataset.sort = h.sort_order;

                        const leftGroup = document.createElement('div');
                        leftGroup.className = 'flex items-center gap-3 w-full';

                        const dragHandle = document.createElement('div');
                        dragHandle.className = 'cursor-grab text-gray-500 hover:text-white px-2 py-1 opacity-60 hover:opacity-100 transition-opacity text-xl leading-none drag-handle select-none touch-manipulation';
                        dragHandle.innerHTML = '&#8801;';

                        const infoDiv = document.createElement('div');
                        infoDiv.className = 'flex-grow';

                        const nameP = document.createElement('p');
                        nameP.className = 'text-white text-sm font-semibold mb-1 tracking-wide';
                        const isStealth = localStorage.getItem('habit_stealth_mode') === 'true';
                        nameP.textContent = isStealth ? h.name.replace(/weed/gi, 'phone usage') : h.name;

                        const typebadge = document.createElement('span');
                        let tText = 'Good Habit'; let tColor = 'text-green-400 border-green-400/30 bg-green-400/10';

                        if (h.target_amount == -2) { tText = 'Shiny (Avoid)'; tColor = 'text-yellow-400 border-yellow-400/30 bg-yellow-400/10'; }

                        typebadge.className = 'text-[9px] uppercase px-2 py-0.5 rounded border ' + tColor;
                        typebadge.textContent = tText;

                        infoDiv.appendChild(nameP);
                        infoDiv.appendChild(typebadge);
                        
                        leftGroup.appendChild(dragHandle);
                        leftGroup.appendChild(infoDiv);

                        const archBtn = document.createElement('button');
                        archBtn.className = 'text-[10px] text-gray-500 hover:text-red-400 transition-colors uppercase tracking-wider font-bold w-auto px-3 py-1 bg-transparent border-none ml-2 flex-shrink-0';
                        archBtn.textContent = 'Archive';
                        archBtn.onclick = async () => {
                            if (confirm('Archive this habit? It will no longer show up.')) {
                                await client.from('habits').update({ archived: true }).eq('id', h.id);
                                loadHabits();
                            }
                        };

                        wrap.appendChild(leftGroup);
                        wrap.appendChild(archBtn);
                        listEl.appendChild(wrap);
                    });

                    // Initialize Drag and Drop
                    if (window.sortableInstance) window.sortableInstance.destroy();
                    window.sortableInstance = new Sortable(listEl, {
                        animation: 150,
                        handle: '.drag-handle',
                        ghostClass: 'opacity-50',
                        onEnd: async function (evt) {
                            // Collect elements
                            const items = Array.from(listEl.children);
                            // Set new sort order locally
                            items.forEach((item, index) => {
                                item.dataset.sort = index;
                            });

                            // Display saving feedback
                            showFeedback('Saving new order...', false);

                            // Send updates to Supabase
                            const updates = items.map((el, index) => {
                                return client.from('habits').update({ sort_order: index }).eq('id', el.dataset.id);
                            });
                            
                            await Promise.all(updates);
                            showFeedback('Order saved successfully!', false);
                        }
                    });
                };

                addBtn.addEventListener('click', async () => {
                    const val = inputEl.value.trim();
                const typeVal = parseInt(typeEl.value);
                if (!val) return;
                
                addBtn.textContent = 'Saving...';
                
                const today = new Date();
                // Store at noon UTC to ensure day match consistency
                const safeDateStr = today.toISOString().split('T')[0] + 'T12:00:00Z';

                // Safely grab the max sort order
                const { data: maxSortData } = await client
                    .from('habits')
                    .select('sort_order')
                    .eq('passcode_key', passcode)
                    .order('sort_order', { ascending: false })
                    .limit(1);
                
                let newSortOrder = 0;
                if (maxSortData && maxSortData.length > 0) {
                    newSortOrder = (maxSortData[0].sort_order || 0) + 1;
                }

                const { error } = await client.from('habits').insert({
                    passcode_key: passcode,
                    name: val,
                    target_amount: typeVal,
                    sort_order: newSortOrder,
                    created_at: safeDateStr
                });

                if (error) {
                    showFeedback('Failed to save.', true);
                } else {
                    inputEl.value = '';
                    showFeedback('Habit created successfully!', false);
                    loadHabits();
                }
                addBtn.textContent = 'Create Habit';
            });

            inputEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') addBtn.click();
            });

            loadHabits();
        });
    </script>
</body>
</html>
