<html lang="en">
<head>

    <script src="theme.js"></script>
    <link rel="stylesheet" href="global-styles.css">
<meta name="view-transition" content="same-origin" />
</head>
<body class="flex flex-col items-center min-h-screen pt-8 pb-16">
    <nav class="w-full flex justify-center items-center gap-10 mb-6 text-gray-500 mt-4 opacity-80 hover:opacity-100 transition-opacity">
        <a href="index.html" title="Tracker" class="relative flex flex-col items-center justify-center transition-all group hover:text-white text-gray-500 opacity-70 hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-[26px] h-[26px] transition-transform group-hover:scale-110" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
            <span class="absolute -bottom-[8px] w-1.5 h-1.5 rounded-full transition-all duration-300 bg-gray-500 opacity-0 group-hover:opacity-50"></span>
        </a>
        <a href="checklist.html" title="Checklist" class="relative flex flex-col items-center justify-center transition-all group text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-[26px] h-[26px] transition-transform " viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>
            <span class="absolute -bottom-[8px] w-1.5 h-1.5 rounded-full transition-all duration-300 bg-[#58a6ff] opacity-100 nav-active-indicator"></span>
        </a>
        <a href="insights.html" title="Insights" class="relative flex flex-col items-center justify-center transition-all group hover:text-white text-gray-500 opacity-70 hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-[26px] h-[26px] transition-transform group-hover:scale-110" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
            <span class="absolute -bottom-[8px] w-1.5 h-1.5 rounded-full transition-all duration-300 bg-gray-500 opacity-0 group-hover:opacity-50"></span>
        </a>
        <a href="settings.html" title="Settings" class="relative flex flex-col items-center justify-center transition-all group hover:text-white text-gray-500 opacity-70 hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-[26px] h-[26px] transition-transform group-hover:scale-110" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            <span class="absolute -bottom-[8px] w-1.5 h-1.5 rounded-full transition-all duration-300 bg-gray-500 opacity-0 group-hover:opacity-50"></span>
        </a>
    </nav>
    <div class="w-full max-w-2xl px-4 flex flex-col gap-6">
        <div class="text-center mt-2 mb-2">
            <h1 class="text-2xl tracking-widest text-white uppercase font-light mb-2">Checklist</h1>
            <p class="text-gray-500 text-sm tracking-wide">Rolling task backlog</p>
        </div>

        <div class="flex items-center gap-2 bg-[#161b22] border border-[#30363d] p-2 rounded-xl focus-within:border-[#58a6ff] transition-colors">
            <input type="text" id="new-task-input" placeholder="Add a new task..." class="task-input px-2 py-1 flex-1 min-w-[100px] bg-transparent text-sm text-gray-200 outline-none placeholder-gray-500">
            <input type="date" id="new-task-date" class="bg-transparent text-xs text-gray-400 border border-[#30363d] rounded p-1.5 outline-none custom-date">
            <button id="add-task-btn" class="flex-shrink-0 bg-[#238636] hover:bg-[#2ea043] text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Add</button>
        </div>

        <div id="tasks-container" class="flex flex-col gap-3 mt-4">
            <!-- Tasks rendered here -->
            <p class="text-center text-gray-500 text-sm italic">Loading tasks...</p>
        </div>
    </div>

    <script> (() => { const passcode = localStorage.getItem('habit_passcode');
        if (!passcode) window.location.href = 'index.html';

        const client = window.supabase.createClient(window.HABIT_SUPABASE_URL, window.HABIT_SUPABASE_ANON_KEY);
        let tasks = [];

        let audioCtx = null;
        const playSound = (type) => {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                const now = audioCtx.currentTime;
                
                if (type === 'tick') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.05, now + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'untick') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(400, now + 0.05);
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.05, now + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                }
            } catch (e) {}
        };

        const loadTasks = async () => {
            const { data, error } = await client.from('tasks').select('*')
                .eq('passcode_key', passcode).order('created_at', { ascending: false });
            if (!error && data) {
                tasks = data;
                renderTasks();
            }
        };

        let completedExpanded = false;
        let pendingExpanded = false;

        const renderTasks = () => {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';
            
            const pendingTasks = tasks.filter(t => !t.completed).sort((a,b) => {
                return new Date(b.created_at) - new Date(a.created_at);
            });

            const completedTasks = tasks.filter(t => t.completed).sort((a,b) => {
                const dateA = a.completed_date ? new Date(a.completed_date) : new Date(a.created_at);
                const dateB = b.completed_date ? new Date(b.completed_date) : new Date(b.created_at);
                return dateB - dateA;
            });

            if(tasks.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 text-sm italic">Clean slate.</p>';
                return;
            }

            const createCard = (t) => {
                const el = document.createElement('div');
                el.className = 'flex items-center justify-between p-3 bg-[#161b22] border border-[#30363d] rounded-xl cursor-pointer hover:border-gray-500 transition-colors group ' + (t.completed ? 'opacity-50 hover:opacity-80' : '');
                
                const left = document.createElement('div');
                left.className = 'flex items-center gap-3 overflow-hidden';
                
                const btn = document.createElement('button');
                btn.className = 'w-5 h-5 rounded flex-shrink-0 flex items-center justify-center border transition-colors ' + 
                    (t.completed ? 'bg-green-500 border-green-500 text-black' : 'bg-[#0d1117] border-[#30363d] group-hover:border-gray-400');
                btn.innerHTML = t.completed ? '✓' : '';
                
                const text = document.createElement('span');
                text.className = 'text-sm text-gray-300 truncate ' + (t.completed ? 'line-through text-gray-500' : '');
                text.textContent = t.text;

                left.appendChild(btn);
                left.appendChild(text);

                const right = document.createElement('div');
                right.className = 'flex items-center justify-end gap-3 text-xs flex-shrink-0';
                
                if (t.target_date) {
                    const dSpan = document.createElement('span');
                    dSpan.className = 'text-[#58a6ff] bg-[#58a6ff]/10 px-2 py-0.5 rounded';
                    dSpan.textContent = new Date(t.target_date + 'T12:00:00').toLocaleDateString(undefined, {month: 'short', day: 'numeric'});
                    right.appendChild(dSpan);
                }

                const delBtn = document.createElement('button');
                delBtn.className = 'text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity font-bold px-1 ml-1 text-base';
                delBtn.textContent = '❌';
                
                delBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    el.style.opacity = '0';
                    el.style.transform = 'scale(0.95)';
                    el.style.transition = 'all 0.2s';
                    setTimeout(async () => {
                        tasks = tasks.filter(x => x.id !== t.id);
                        renderTasks();
                        await client.from('tasks').delete().eq('id', t.id);
                    }, 200);
                });

                right.appendChild(delBtn);
                
                el.addEventListener('click', async () => {
                    t.completed = !t.completed;
                    t.completed_date = t.completed ? new Date().toISOString() : null;
                    playSound(t.completed ? 'tick' : 'untick');
                    
                    // Delay slightly for sound, then re-render completely to move to correct section
                    setTimeout(() => renderTasks(), 250);
                    
                    await client.from('tasks').update({ completed: t.completed, completed_date: t.completed_date }).eq('id', t.id);
                });

                el.appendChild(left);
                el.appendChild(right);
                return el;
            };

                        const maxPendingVisible = 3;
            const visiblePending = pendingExpanded ? pendingTasks : pendingTasks.slice(0, maxPendingVisible);
            
            visiblePending.forEach(t => container.appendChild(createCard(t)));
            
            if (pendingTasks.length > maxPendingVisible) {
                const togglePendingBtn = document.createElement('button');
                togglePendingBtn.className = 'w-full py-2 mt-1 text-xs text-gray-500 hover:text-white transition-colors bg-[#161b22] border border-[#30363d] rounded-xl font-medium tracking-wide flex justify-center items-center gap-1.5';
                togglePendingBtn.innerHTML = pendingExpanded ? '<span class="text-[10px]">▲</span> Show Less' : `<span class="text-[10px]">▼</span> Show ${pendingTasks.length - maxPendingVisible} More`;
                togglePendingBtn.addEventListener('click', () => {
                    pendingExpanded = !pendingExpanded;
                    renderTasks();
                });
                container.appendChild(togglePendingBtn);
            }

            if (completedTasks.length > 0) {
                const completeBlock = document.createElement('div');
                completeBlock.className = 'mt-3 border border-[#30363d] rounded-xl overflow-hidden';
                
                const header = document.createElement('button');
                header.className = 'w-full flex items-center justify-between p-3 bg-[#161b22] hover:bg-[#21262d] transition-colors text-sm text-gray-500';
                
                const headerText = document.createElement('span');
                headerText.className = 'font-medium tracking-wide uppercase text-[10px] ml-1';
                headerText.textContent = `Completed (${completedTasks.length})`;
                
                const chevron = document.createElement('span');
                chevron.className = 'transform transition-transform text-[10px] duration-200 ' + (completedExpanded ? 'rotate-180' : 'rotate-0');
                chevron.innerHTML = '▼';
                
                header.appendChild(headerText);
                header.appendChild(chevron);
                completeBlock.appendChild(header);
                
                const list = document.createElement('div');
                list.className = 'flex-col gap-2 p-2 bg-[#0d1117] ' + (completedExpanded ? 'flex' : 'hidden');
                
                completedTasks.forEach(t => list.appendChild(createCard(t)));
                
                header.addEventListener('click', () => {
                    completedExpanded = !completedExpanded;
                    list.className = 'flex-col gap-2 p-2 bg-[#0d1117] ' + (completedExpanded ? 'flex' : 'hidden');
                    chevron.className = 'transform transition-transform text-[10px] duration-200 ' + (completedExpanded ? 'rotate-180' : 'rotate-0');
                });
                
                completeBlock.appendChild(list);
                container.appendChild(completeBlock);
            }
        };

        const addTask = async () => {
            const input = document.getElementById('new-task-input');
            const dateInput = document.getElementById('new-task-date');
            if(!input.value.trim()) return;

            const nTask = {
                id: crypto.randomUUID(),
                passcode_key: passcode,
                text: input.value.trim(),
                target_date: dateInput.value || null,
                completed: false
            };
            
            tasks.unshift(nTask);
            renderTasks();
            input.value = '';
            dateInput.value = '';

            const { data, error } = await client.from('tasks').insert(nTask).select().single();
            if(data) {
                const idx = tasks.findIndex(x => x.id === nTask.id);
                if(idx > -1) tasks[idx].id = data.id;
            }
        };

        document.getElementById('add-task-btn').addEventListener('click', addTask);
        document.getElementById('new-task-input').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') addTask();
        });

        loadTasks(); })(); </script>
</body>
</html>
