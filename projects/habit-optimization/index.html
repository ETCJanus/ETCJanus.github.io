<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js" defer></script>
    <style>
        body { font-family: ui-sans-serif, system-ui, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }

        .month-grid { display: grid; gap: 8px; grid-template-columns: repeat(7, 1fr); align-content: start; }

        .day-cell { width: 100%; aspect-ratio: 1; border-radius: 6px; transition: transform 0.1s, outline 0.1s; background-color: #161b22; outline: 1px solid rgba(255,255,255,0.05); position: relative; }
        .day-cell.active { cursor: pointer; }
        .day-cell.active:hover { transform: scale(1.15); outline: 2px solid #58a6ff; z-index: 10; }
        .day-cell.inactive { opacity: 0.15; background-color: #0d1117; outline: 1px dashed rgba(255,255,255,0.1); cursor: default; }

        .level-0 { background-color: #161b22; }
        .level-1 { background-color: #0e4429; }
        .level-2 { background-color: #006d32; }
        .level-3 { background-color: #26a641; }
        .level-4 { background-color: #39d353; }

        /* Indicators */
        .indicator-missing-sleep, .indicator-missing-note {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            bottom: 4px;
            pointer-events: none;
            box-shadow: 0px 0px 3px rgba(0,0,0,0.5);
        }
        .indicator-missing-sleep { right: 4px; background-color: #f78166; } /* Orange missing sleep */
        .indicator-missing-note { right: 12px; background-color: #58a6ff; } /* Blue missing note */
        
        .day-cell.active:hover .indicator-missing-sleep,
        .day-cell.active:hover .indicator-missing-note { opacity: 0; }

        /* Shiny Success */
        @keyframes shinyGlow {
            0% { box-shadow: 0 0 8px rgba(234, 179, 8, 0.4); border-color: rgba(234, 179, 8, 0.6); }
            50% { box-shadow: 0 0 16px rgba(234, 179, 8, 0.9); border-color: rgba(234, 179, 8, 1); }
            100% { box-shadow: 0 0 8px rgba(234, 179, 8, 0.4); border-color: rgba(234, 179, 8, 0.6); }
        }
        @keyframes shineSweep {
            0% { left: -150%; opacity: 0; }
            5% { opacity: 1; }
            15% { left: 150%; opacity: 1; }
            16% { opacity: 0; left: 150%; }
            100% { left: 150%; opacity: 0; }
        }
        .shiny-day {
            animation: shinyGlow 3s ease-in-out infinite !important;
            border: 1px solid rgba(234,179,8,0.8) !important;
            outline: none !important;
            z-index: 5;
            position: relative;
            overflow: hidden;
        }
        .shiny-day::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-20deg);
            animation: shineSweep 5s infinite;
            pointer-events: none;
            z-index: 10;
        }
        .shiny-day:hover { outline: 2px solid #58a6ff !important; overflow: visible; z-index: 20; }

        input, textarea, button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px; padding: 8px; }
        input:focus, textarea:focus { outline: none; border-color: #58a6ff; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .btn-primary { background: #238636; border: 1px solid rgba(240,246,252,0.1); cursor: pointer; color: white; font-weight: bold; width: 100%; transition: background 0.1s; }
        .btn-primary:hover { background: #2ea043; }

        /* Modal specific sizing */
        #day-modal { align-items: center; justify-content: center; backdrop-filter: blur(8px); }

        /* Emoji Mood Tracking */
        .mood-btn { display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: #161b22; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; user-select: none; transition: transform 0.1s; }
        .mood-btn:hover { transform: scale(1.1); background: #21262d; }
        .mood-btn.selected { background: #238636; border-color: #2ea043; box-shadow: 0 0 10px rgba(46,160,67,0.4); transform: scale(1.1); }
        .mood-btn.selected span { filter: brightness(1.2); }
        
        .sleep-display-btn { display: flex; align-items: center; justify-content: center; background: transparent; border: 1px dashed #30363d; border-radius: 8px; font-size: 1.5rem; cursor: pointer; transition: all 0.2s; width: 100%; height: 50px; }
        .sleep-display-btn:hover { background: #161b22; border-color: #58a6ff; }
    </style>
    <script src="theme.js"></script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen pb-16 pt-8">

    <!-- Auth View -->
    <div id="auth-view" class="w-80 flex flex-col gap-4 mx-auto mt-20">
        <h1 class="text-2xl font-light text-center mb-4 tracking-widest text-[#58a6ff]">Enter Passcode</h1>
        <input type="password" id="passcode-input" placeholder="Your key..." class="w-full text-[16px] text-center" />
        <button id="login-btn" class="btn-primary py-2 text-sm uppercase tracking-wider">Access</button>
        <p id="login-error" class="hidden text-red-400 text-sm text-center mt-2"></p>
    </div>

    <!-- App View -->
    <div id="app-view" class="w-full hidden flex flex-col items-center max-w-4xl px-4 relative mt-12">
        <nav class="w-full flex justify-center gap-8 mb-4 text-xs font-semibold tracking-widest text-gray-500 uppercase absolute -top-12">
            <a href="settings.html" class="hover:text-white transition-colors">Settings</a>
            <a href="insights.html" class="hover:text-white transition-colors">Insights</a>
        </nav>
          <!-- Legend (Moved to the top) -->
        <div class="mb-10 flex items-center justify-center gap-2 text-xs text-gray-600">
            <span>Less</span>
            <div class="w-3 h-3 rounded-sm level-0 border border-[#30363d]"></div>
            <div class="w-3 h-3 rounded-sm level-1 border border-[#30363d]"></div>
            <div class="w-3 h-3 rounded-sm level-2 border border-[#30363d]"></div>
            <div class="w-3 h-3 rounded-sm level-3 border border-[#30363d]"></div>
            <div class="w-3 h-3 rounded-sm level-4 border border-[#30363d]"></div>
            <span>More</span>
            
            <span class="ml-4 pl-4 border-l border-[#30363d] flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#f78166]"></span> No Sleep Log
            </span>
            <span class="ml-2 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#58a6ff]"></span> No Note
            </span>
        </div>

        <!-- Grid Container dynamically fed by JS based on setting -->
        <div id="grid-container" class="w-full max-w-2xl px-2 flex flex-col gap-12"></div>
    <!-- Day Modal Structure -->
    <div id="day-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center px-4 py-12 md:p-12">
        <div class="bg-[#0d1117] border border-[#30363d] rounded-2xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[92vh] overflow-hidden relative">

            <!-- Sticky Header -->
            <div class="px-6 py-4 border-b border-[#30363d] flex justify-between items-center bg-[#0d1117] z-10 sticky top-0">
                <div class="flex items-center gap-6">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Daily Review</p>
                        <h2 id="modal-date" class="text-xl font-light text-white tracking-wide">...</h2>
                    </div>
                    
                    <!-- Minified Sleep/Mood Stats Container (Top Header) -->
                    <div id="compact-metrics" class="hidden flex items-center justify-center gap-4 border-l border-[#30363d] pl-6 ml-2">
                        <button id="min-sleep-btn" title="Sleep" class="flex items-center gap-2 text-sm font-medium text-gray-300 hover:text-white transition-colors bg-[#161b22] px-3 py-1.5 rounded-full border border-[#30363d] hover:border-[#58a6ff]">
                            <span>🌙</span><span id="min-sleep-display"></span>
                        </button>
                        <button id="min-mood-btn" title="Mood" class="flex items-center gap-2 text-sm font-medium text-gray-300 hover:text-white transition-colors bg-[#161b22] px-3 py-1.5 rounded-full border border-[#30363d] hover:border-[#58a6ff]">
                            <span>😊</span><span id="min-mood-display"></span>
                        </button>
                    </div>
                </div>
                
                <button id="close-modal-btn" class="text-gray-400 hover:text-white transition-colors w-10 h-10 md:w-8 md:h-8 flex items-center justify-center rounded-full hover:bg-[#21262d] bg-[#161b22] md:bg-transparent border border-[#30363d] md:border-transparent shadow-lg md:shadow-none text-2xl md:text-base leading-none pb-1 md:pb-0 z-50">&times;</button>
            </div>

            <!-- Scrollable Content -->
            <div class="p-6 md:p-8 overflow-y-auto flex flex-col gap-6 flex-grow pb-12">

                <!-- Quick Metrics Row (Expanded) -->
                <div id="expanded-metrics-row" class="grid grid-cols-2 gap-3">
                    <!-- SLEEP -->
                    <div class="bg-[#161b22] border border-[#30363d] rounded-xl p-3 flex flex-col justify-center transition-all hover:border-[#58a6ff]">
                        <h3 class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1 flex items-center gap-1">
                            <span>🌙 Sleep Time</span>
                        </h3>
                        <div id="sleep-inputs-container" class="flex items-center gap-1">
                            <input type="time" id="sleep-start" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-1 text-[16px] md:text-xs text-center text-gray-300 focus:border-[#58a6ff] outline-none">
                            <span class="text-gray-600 text-[10px]">-</span>
                            <input type="time" id="sleep-end" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-1 text-[16px] md:text-xs text-center text-gray-300 focus:border-[#58a6ff] outline-none">
                        </div>
                    </div>

                    <!-- ENERGY -->
                    <div class="bg-[#161b22] border border-[#30363d] rounded-xl p-3 flex flex-col justify-center transition-all hover:border-[#58a6ff]">
                        <h3 class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1 flex items-center gap-1">
                            <span>😊 Mood</span>
                        </h3>
                        <div id="mood-inputs-container" class="flex items-center w-full">
                            <input type="number" id="mood-input" min="1" max="10" placeholder="Scale 1-10" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-1 text-[16px] md:text-xs text-center text-gray-300 focus:border-[#58a6ff] outline-none">
                        </div>
                    </div>
                </div>

                <!-- JOURNAL NOTE -->
                <div class="bg-[#161b22] border border-[#30363d] rounded-xl overflow-hidden transition-all duration-300" id="note-container">
                    <button id="note-toggle-btn" class="w-full px-4 py-3 flex items-center justify-between text-left hover:bg-[#21262d] transition-colors">
                        <div class="flex items-center gap-3">
                            <span class="text-gray-500">📝</span>
                            <span class="text-sm text-gray-300 font-medium" id="note-preview">Add a journal note...</span>
                        </div>
                        <span class="text-gray-600 text-xs transition-transform duration-200" id="note-chevron">▼</span>
                    </button>
                    <div id="note-editor-wrapper" class="hidden border-t border-[#30363d] bg-[#0d1117]">
                        <textarea id="modal-note" placeholder="What's on your mind??" class="w-full min-h-[100px] resize-none text-[16px] md:text-sm p-4 leading-relaxed text-gray-300 bg-transparent border-none focus:outline-none focus:ring-0"></textarea>
                    </div>
                </div>

                <!-- HABITS -->
                <div>
                    <h3 class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-3 px-1">Habits & Goals</h3>
                    <div id="modal-habits" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 mb-4">
                        <!-- Habit chunks injected here -->
                    </div>
                </div>

                <!-- MOBILE CLOSE BTN -->
                <div class="mt-2 md:hidden">
                    <button id="close-modal-btn-bottom" class="w-full py-4 rounded-xl bg-[#21262d] border border-[#30363d] text-gray-200 font-bold uppercase tracking-wider text-[11px] hover:bg-[#30363d] transition-colors shadow-sm">Save & Close Day</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Glanceable Tooltip -->
    <div id="grid-tooltip" class="fixed z-[100] pointer-events-none hidden bg-[#161b22] border border-[#30363d] rounded-md shadow-xl p-3 max-w-[220px] transition-opacity duration-150">
        <div class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1" id="tooltip-date"></div>
        <div class="text-sm text-gray-300 mb-2 truncate italic" id="tooltip-note"></div>
        <div class="flex items-center gap-3 text-xs text-gray-400 font-semibold" id="tooltip-metrics"></div>
    </div>

</body>
</html>
