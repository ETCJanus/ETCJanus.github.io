<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="global-styles.css">
    <script src="theme.js"></script>
<meta name="view-transition" content="same-origin" />
</head>
<body class="flex flex-col items-center justify-center min-h-screen pb-16 pt-8">

    
    <div id="app-view" class="w-full flex flex-col items-center max-w-4xl px-4 relative mt-12">
        <nav class="w-full flex justify-center items-center gap-10 mb-4 text-gray-500 absolute -top-12 opacity-80 hover:opacity-100 transition-opacity">
        <a href="index.html" title="Tracker" class="relative flex flex-col items-center justify-center transition-all group text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-[26px] h-[26px] transition-transform " viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
            <span class="absolute -bottom-[8px] w-1.5 h-1.5 rounded-full transition-all duration-300 bg-[#58a6ff] opacity-100 nav-active-indicator"></span>
        </a>
        <a href="checklist.html" title="Checklist" class="relative flex flex-col items-center justify-center transition-all group hover:text-white text-gray-500 opacity-70 hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-[26px] h-[26px] transition-transform group-hover:scale-110" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>
            <span class="absolute -bottom-[8px] w-1.5 h-1.5 rounded-full transition-all duration-300 bg-gray-500 opacity-0 group-hover:opacity-50"></span>
        </a>
        <a href="insights.html" title="Insights" class="relative flex flex-col items-center justify-center transition-all group hover:text-white text-gray-500 opacity-70 hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-[26px] h-[26px] transition-transform group-hover:scale-110" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
            <span class="absolute -bottom-[8px] w-1.5 h-1.5 rounded-full transition-all duration-300 bg-gray-500 opacity-0 group-hover:opacity-50"></span>
        </a>
        <a href="settings.html" title="Settings" class="relative flex flex-col items-center justify-center transition-all group hover:text-white text-gray-500 opacity-70 hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-[26px] h-[26px] transition-transform group-hover:scale-110" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            <span class="absolute -bottom-[8px] w-1.5 h-1.5 rounded-full transition-all duration-300 bg-gray-500 opacity-0 group-hover:opacity-50"></span>
        </a>
    </nav>
          <!-- Grid Container dynamically fed by JS based on setting -->
        <div id="grid-container" class="w-full max-w-2xl px-2 flex flex-col gap-12"></div>

        <!-- Legend (Moved to the bottom) -->
        <div class="mt-12 flex items-center justify-center gap-2 text-xs text-gray-600">
            <span>Less</span>
            <div class="w-3 h-3 rounded-sm level-0 border border-[#30363d]"></div>
            <div class="w-3 h-3 rounded-sm level-1 border border-[#30363d]"></div>
            <div class="w-3 h-3 rounded-sm level-2 border border-[#30363d]"></div>
            <div class="w-3 h-3 rounded-sm level-3 border border-[#30363d]"></div>
            <div class="w-3 h-3 rounded-sm level-4 border border-[#30363d]"></div>
            <span>More</span>
            
            <span class="ml-4 pl-4 border-l border-[#30363d] flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#f78166]"></span> No Sleep Log
            </span>
            <span class="ml-2 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#58a6ff]"></span> No Note
            </span>
        </div>

    <!-- Day Modal Structure -->
    <div id="day-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center px-4 py-20 md:p-12 z-50">
        <div class="bg-[#0d1117] border border-[#30363d] rounded-2xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[85vh] md:max-h-[92vh] overflow-hidden relative">

            <!-- Sticky Header -->
            <div class="px-4 py-3 md:px-6 md:py-4 border-b border-[#30363d] flex justify-between items-center bg-[#0d1117] z-10 sticky top-0">
                <div class="flex items-center gap-3 md:gap-6">
                    <div>
                        <p class="hidden md:block text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-1">Daily Review</p>
                        <h2 id="modal-date" class="text-lg md:text-xl font-light text-white tracking-wide">...</h2>
                    </div>
                    
                    <!-- Minified Sleep/Mood Stats Container (Top Header) -->
                    <button id="open-memory-log-btn" title="Add Details" class="hidden items-center justify-center gap-1.5 px-3 md:px-4 py-1.5 md:py-2 ml-2 md:ml-4 bg-[#161b22] border border-[#30363d] rounded-full hover:border-[#58a6ff] hover:bg-[#1f242d] transition-all shadow-sm text-[11px] md:text-[12px] font-medium text-gray-300">
                        📝 <span class="hidden sm:inline">Add Details</span>
                    </button>
                    <button id="min-metrics-btn" title="Edit Metrics" class="hidden items-center justify-center gap-2.5 px-3 md:px-4 py-1.5 md:py-2 ml-2 md:ml-4 bg-[#161b22] border border-[#30363d] rounded-full hover:border-[#58a6ff] hover:bg-[#1f242d] transition-all shadow-sm group">
                        <div id="min-sleep-wrap" class="hidden items-center gap-1 md:gap-1.5 text-[11px] md:text-[13px] font-medium text-gray-300 group-hover:text-white transition-colors">
                            <span class="opacity-80">🌙</span><span id="min-sleep-display"></span>
                        </div>
                        <div id="metrics-divider-1" class="hidden w-[1.5px] h-3 bg-[#30363d] group-hover:bg-[#4b5563] transition-colors rounded-full"></div>
                        <div id="min-mood-wrap" class="hidden items-center gap-1 md:gap-1.5 text-[11px] md:text-[13px] font-medium text-gray-300 group-hover:text-white transition-colors">
                            <span class="opacity-80">😊</span><span id="min-mood-display"></span>
                        </div>
                        <div id="metrics-divider-2" class="hidden w-[1.5px] h-3 bg-[#30363d] group-hover:bg-[#4b5563] transition-colors rounded-full"></div>
                        <div id="min-note-wrap" class="hidden items-center gap-1 md:gap-1.5 text-[11px] md:text-[13px] font-medium text-gray-300 group-hover:text-white transition-colors">
                            <span class="opacity-80">📝</span>
                        </div>
                    </button>
                </div>
                
<button id="close-modal-btn" class="text-gray-400 hover:text-white transition-colors w-10 h-10 md:w-8 md:h-8 hidden md:flex items-center justify-center rounded-full hover:bg-[#21262d] bg-[#161b22] md:bg-transparent border border-[#30363d] md:border-transparent shadow-lg md:shadow-none text-2xl md:text-base leading-none pb-1 md:pb-0 z-50">&times;</button>
            </div>

            <!-- Scrollable Content -->
            <div class="p-3 sm:p-4 md:p-8 overflow-y-auto flex flex-col gap-3 md:gap-6 flex-grow pb-6 md:pb-12">

                <!-- HABITS -->
                <div>
                    <h3 class="text-[9px] md:text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-2 md:mb-3 px-1 flex items-center justify-between">Habits & Goals</h3>
                    <div id="modal-habits" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2 md:gap-3 mb-0 md:mb-4">
                        <!-- Habit chunks injected here -->
                    </div>
                </div>

                <!-- CHECKLIST -->
                <div class="mt-2 md:mt-4 border-t border-[#30363d] pt-4 md:pt-6">
                    <div class="flex flex-row items-center justify-between px-1 mb-3">
                        <a href="checklist.html" class="group text-[10px] md:text-[11px] text-gray-400 hover:text-white uppercase tracking-widest font-semibold transition-colors flex items-center gap-1.5 focus:outline-none focus:ring-0 whitespace-nowrap">
                            📋 Checklist <span class="text-[9px] opacity-0 group-hover:opacity-100 transition-opacity">?</span>
                        </a>
                        <button id="add-task-quick-btn" class="w-6 h-6 flex items-center justify-center rounded-full bg-[#161b22] border border-[#30363d] text-gray-400 hover:text-white hover:border-[#58a6ff] hover:bg-[#1f242d] transition-all group" title="Add specific task for this day">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                    </div>

                    <!-- Quick Add Form (Hidden by default) -->
                    <div id="quick-task-form" class="hidden items-center gap-2 mb-3 bg-[#161b22] p-1.5 rounded-lg border border-[#30363d]">
                         <input type="text" id="quick-task-input" placeholder="New specific task for this date..." class="flex-grow bg-transparent border-none text-[13px] text-gray-200 px-2 py-1 focus:ring-0 focus:text-white outline-none">
                         <button id="save-quick-task-btn" class="bg-[#238636] hover:bg-[#2ea043] text-white text-[10px] uppercase font-bold tracking-wider px-3 py-1.5 rounded transition-colors hidden opacity-0">Add</button>
                    </div>

                    <div id="modal-checklist" class="flex flex-col gap-2">
                        <!-- Tasks go here -->
                    </div>
                </div>

            </div>

            <!-- Memory Log Overlay Modal (Hidden by default) -->
            <div id="memory-log-overlay" class="hidden absolute inset-0 bg-[#0d1117] z-40 flex flex-col">
                <div class="px-4 py-3 md:px-6 md:py-4 border-b border-[#30363d] flex justify-between items-center bg-[#0d1117]">
                    <h3 class="text-sm font-semibold text-white flex items-center gap-2">📝 Log Details</h3>
                    <button id="close-memory-log-btn" class="text-gray-400 hover:text-white w-8 h-8 flex items-center justify-center rounded-full hover:bg-[#21262d] transition-colors font-bold text-lg leading-none pb-1">&times;</button>
                </div>
                <div class="p-4 md:p-6 flex flex-col gap-4 flex-grow relative pb-20">
                    <!-- Quick Metrics Row -->
                    <div class="grid grid-cols-2 gap-2 md:gap-3">
                        <!-- SLEEP -->
                        <div class="bg-[#161b22] px-3 md:px-4 py-3 md:py-4 flex flex-col justify-center border border-[#30363d] rounded-xl transition-all hover:border-[#58a6ff]">
                            <span class="text-[10px] md:text-[11px] text-gray-500 uppercase tracking-widest font-bold mb-2 flex items-center gap-1.5">🌙 Sleep Time</span>
                            <div id="sleep-inputs-container" class="flex items-center gap-1 w-full justify-between">
                                <input type="time" id="sleep-start" class="w-[45%] bg-transparent border-b border-[#30363d] p-0 text-[14px] text-center text-white focus:ring-0 focus:border-[#58a6ff] outline-none font-medium h-8">
                                <span class="text-gray-600 text-xs">-</span>
                                <input type="time" id="sleep-end" class="w-[45%] bg-transparent border-b border-[#30363d] p-0 text-[14px] text-center text-white focus:ring-0 focus:border-[#58a6ff] outline-none font-medium h-8">
                            </div>
                        </div>

                        <!-- ENERGY -->
                        <div class="bg-[#161b22] px-3 md:px-4 py-3 md:py-4 flex flex-col justify-center border border-[#30363d] rounded-xl transition-all hover:border-[#58a6ff]">
                             <span class="text-[10px] md:text-[11px] text-gray-500 uppercase tracking-widest font-bold mb-2 flex items-center gap-1.5">😊 Mood</span>
                            <div id="mood-inputs-container" class="flex items-center justify-center w-full h-8">
                                <input type="number" id="mood-input" min="1" max="10" placeholder="Scale 1-10" class="w-full bg-transparent border-b border-[#30363d] p-0 text-[14px] text-center text-white focus:ring-0 focus:border-[#58a6ff] outline-none font-medium h-8">
                            </div>
                        </div>
                    </div>

                    <!-- JOURNAL NOTE -->
                    <div class="bg-[#161b22] border border-[#30363d] rounded-xl overflow-hidden flex flex-col flex-grow shadow-sm min-h-[200px]">
                        <div class="px-4 py-3 border-b border-[#30363d] flex items-center justify-between gap-2">
                            <div class="flex items-center gap-2">
                                <span class="text-gray-500 text-sm">📝</span>
                                <span class="text-[11px] text-gray-400 uppercase tracking-widest font-semibold">Journal Note</span>
                            </div>
                            <span id="save-memory-log-btn" class="text-[10px] text-green-500 font-semibold cursor-pointer hover:text-green-400 uppercase tracking-widest invisible">Auto-saved ?</span>
                        </div>
                        <textarea id="modal-note" placeholder="Write down your thoughts..." class="flex-grow w-full resize-none text-[15px] p-4 leading-relaxed text-gray-200 bg-transparent border-none focus:outline-none focus:ring-0 placeholder:italic transition-opacity h-full"></textarea>
                    </div>
                </div>
            </div>

                <!-- MOBILE CLOSE BTN -->


        </div>
    </div>

    <!-- Glanceable Tooltip -->
    <div id="grid-tooltip" class="fixed z-[100] pointer-events-none hidden bg-[#161b22] border border-[#30363d] rounded-md shadow-xl p-3 max-w-[220px] transition-opacity duration-150">
        <div class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1" id="tooltip-date"></div>
        <div class="text-sm text-gray-300 mb-2 truncate italic" id="tooltip-note"></div>
        <div class="flex items-center gap-3 text-xs text-gray-400 font-semibold" id="tooltip-metrics"></div>
    </div>

</body>
</html>
