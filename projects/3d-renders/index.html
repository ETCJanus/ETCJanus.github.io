<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>3D Renders | Ewoud Janus</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        .gallery-container{max-width:1200px;margin:40px auto;padding:0 20px}
        .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
        .gallery-item{position:relative;overflow:hidden;border-radius:8px;cursor:pointer}
        .gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
        .gallery-item:hover img{transform:scale(1.05)}
        .caption{position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,.5);color:#fff;padding:6px 10px;border-radius:6px;font-size:.9rem}

        .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:24px;z-index:9999;visibility:hidden;opacity:0;transition:opacity .2s ease}
        .lightbox.visible{visibility:visible;opacity:1}
        .lightbox img{max-width:95%;max-height:90%;box-shadow:0 10px 40px rgba(0,0,0,.6);border-radius:6px}
        .lightbox .close{position:absolute;right:20px;top:18px;color:#fff;font-size:28px;cursor:pointer}
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <div class="logo"><a href="../../index.html">EJ.</a></div>
        </div>
        <div class="links">
            <a href="../../projects.html">Back to Projects</a>
        </div>
    </nav>

    <div class="gallery-container">
        <h1>3D Renders</h1>
        <p class="muted-text">A selection of Blender renders and experiments. Click any thumbnail to view a larger version.</p>

        <div id="gallery" class="gallery-grid" aria-live="polite"></div>
    </div>

    <div id="lightbox" class="lightbox" role="dialog" aria-hidden="true">
        <button class="close" id="lb-close" aria-label="Close">&times;</button>
        <div id="lb-media" style="max-width:95%;max-height:90%;display:flex;align-items:center;justify-content:center"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
